<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeMMO Companion</title>
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/app.css">
</head>
<body>
    <!-- Minimize pill (shown when app is hidden) -->
    <div class="pill" id="pill" onclick="window.__app.show()">PMC</div>

    <!-- Main app -->
    <div class="app compact" id="app">
        <!-- Header (drag handle) -->
        <div class="header" id="dragHeader" data-tauri-drag-region>
            <div class="header-left">
                <span class="header-location" id="headerLocation">NUVEMA TOWN</span>
                <span class="header-progress" id="headerProgress">0/6</span>
            </div>
            <div class="header-right">
                <div style="position:relative;" class="no-drag">
                    <div class="profile-trigger" id="profileTrigger" onclick="window.__profiles.toggleDropdown()">👤</div>
                    <div class="profile-dropdown" id="profileDropdown"></div>
                </div>
                <button class="header-btn no-drag" id="btnLock" onclick="window.__app.toggleDragLock()" title="Lock position">🔓</button>
                <button class="header-btn full-only no-drag" id="btnCollapse" onclick="window.__app.toggleMode()" title="Collapse">▲</button>
                <button class="header-btn no-drag" id="btnHide" onclick="window.__app.hide()" title="Hide — press Ctrl+Shift+G to show again">✕</button>
            </div>
        </div>

        <!-- Compact: current step -->
        <div class="compact-step" id="compactStep"></div>
        <div class="compact-next" id="compactNext"></div>
        <div class="expand-bar" onclick="window.__app.toggleMode()">▼ EXPAND GUIDE</div>

        <!-- Full: scrollable step list -->
        <div class="guide-steps full-only" id="guideSteps"></div>

        <!-- Full: footer -->
        <div class="footer full-only">
            <button class="footer-btn" onclick="window.__steps.undoLast()" title="Undo last step">↩ Undo</button>
            <button class="footer-btn" onclick="window.__app.showMap()">📍 Map</button>
            <button class="footer-btn primary" onclick="window.__steps.completeCurrent()">✓ Complete</button>
            <button class="footer-btn danger" onclick="window.__steps.clearAll()" title="Clear all progress">⟲ Clear</button>
        </div>
    </div>

    <!-- New Profile Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>NEW PROFILE</h3>
            <input type="text" id="newProfileName" placeholder="Username...">
            <div style="font-size:0.75em;color:var(--text-secondary);margin-bottom:6px;">Choose your starter:</div>
            <div class="starter-options">
                <div class="starter-btn" data-starter="Snivy" onclick="window.__profiles.selectStarter(this)">🌿 Snivy</div>
                <div class="starter-btn" data-starter="Tepig" onclick="window.__profiles.selectStarter(this)">🔥 Tepig</div>
                <div class="starter-btn" data-starter="Oshawott" onclick="window.__profiles.selectStarter(this)">💧 Oshawott</div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="window.__profiles.closeModal()">Cancel</button>
                <button class="btn-create" onclick="window.__profiles.createProfile()">Create</button>
            </div>
        </div>
    </div>

    <script src="js/steps.js"></script>
    <script src="js/profiles.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
