<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeMMO Companion</title>
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/app.css">
</head>
<body>
    <!-- Minimize pill (shown when app is hidden) -->
    <div class="pill" id="pill" onclick="window.__app.show()">PMC</div>

    <!-- Main app -->
    <div class="app compact" id="app">
        <!-- Header (drag handle) -->
        <div class="header" id="dragHeader" data-tauri-drag-region>
            <div class="header-top">
                <!-- Location name (flex fills space, marquee scrolls if truncated) -->
                <div class="header-location-wrap no-drag" id="headerLocationWrap">
                    <span class="header-location" id="headerLocation">NUVEMA TOWN</span>
                </div>
                <!-- RPG progress chip -->
                <div class="header-progress-chip no-drag">
                    <span class="header-progress-label">STEP</span>
                    <div class="header-progress-bar">
                        <div class="header-progress-fill" id="headerProgressFill" style="width:0%"></div>
                    </div>
                    <span class="header-progress-count" id="headerProgress">0/6</span>
                </div>
                <!-- Overall % -->
                <span class="header-progress-total no-drag" id="headerProgressTotal">0%</span>
                <!-- Buttons -->
                <div class="header-right">
                    <div style="position:relative;" class="no-drag">
                        <div class="profile-trigger" id="profileTrigger" onclick="window.__profiles.toggleDropdown()">P</div>
                        <div class="profile-dropdown" id="profileDropdown"></div>
                    </div>
                    <button class="header-btn no-drag" id="btnToggleMode" onclick="window.__app.toggleMode()" title="Expand/Collapse">▼</button>
                    <button class="header-btn no-drag" id="btnHide" onclick="window.__app.closeApp()" title="Save & close">✕</button>
                </div>
            </div>
        </div>

        <!-- Compact: current step -->
        <div class="compact-step" id="compactStep"></div>
        <div class="compact-next" id="compactNext"></div>
        <div class="expand-bar" onclick="window.__app.toggleMode()">
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,1 5,5 9,1"/></svg>
            <span id="expandBarCount"></span>
        </div>

        <!-- Full: scrollable step list -->
        <div class="guide-steps full-only" id="guideSteps"></div>

        <!-- Type Chart Panel -->
        <div class="panel-overlay" id="typeChartPanel"></div>
        <!-- Navigation Panel -->
        <div class="panel-overlay" id="navPanel"></div>
        <!-- Settings Panel -->
        <div class="panel-overlay" id="settingsPanel"></div>

        <!-- Full: footer -->
        <div class="footer full-only">
            <button class="footer-btn" id="btnNav" onclick="window.__app.toggleNav()">Nav</button>
            <button class="footer-btn" id="btnTypeChart" onclick="window.__app.toggleTypeChart()">Types</button>
            <button class="footer-btn primary" onclick="window.__steps.completeCurrent()">Next</button>
            <button class="footer-btn" onclick="window.__steps.completeSection()" title="Skip to next location">Skip</button>
            <button class="footer-btn" id="btnSettings" onclick="window.__app.toggleSettings()">Cfg</button>
        </div>
    </div>

    <!-- New Profile Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>NEW PROFILE</h3>
            <input type="text" id="newProfileName" placeholder="Username...">
            <div style="font-size:0.75em;color:var(--text-secondary);margin-bottom:6px;">Choose your starter:</div>
            <div class="starter-options">
                <div class="starter-btn" data-starter="Snivy" onclick="window.__profiles.selectStarter(this)">🌿 Snivy</div>
                <div class="starter-btn" data-starter="Tepig" onclick="window.__profiles.selectStarter(this)">🔥 Tepig</div>
                <div class="starter-btn" data-starter="Oshawott" onclick="window.__profiles.selectStarter(this)">💧 Oshawott</div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="window.__profiles.closeModal()">Cancel</button>
                <button class="btn-create" onclick="window.__profiles.createProfile()">Create</button>
            </div>
        </div>
    </div>

    <script src="js/ui.js"></script>
    <script src="js/catches.js"></script>
    <script src="js/typechart.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/steps.js"></script>
    <script src="js/profiles.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
